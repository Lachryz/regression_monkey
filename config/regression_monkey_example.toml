# regression_monkey_example.toml
# 示例配置：复制后把 data、y、x、控制变量和 FE 列名改成你的真实字段。
#
# 运行：
#   uv run regression_monkey.py regression_monkey_example.toml
#   uv run regression_monkey.py regression_monkey_example.toml --engine stata
#
# 说明：
# - controls_must 中的普通变量会进入每个规格。
# - controls_must 中的嵌套 list 表示“必须选 1 个”，例如 ["roa", "roe"]。
# - controls_test 中的普通变量表示“选 0 或 1 个”。
# - controls_test 中的嵌套 list 表示“最多选 1 个”，也可以不选。

# ── 数据 ──────────────────────────────────────────────────────
data = "data/panel.dta"  # 支持 .dta / .csv / .parquet / .pq

# ── 变量 ──────────────────────────────────────────────────────
y = ["outcome_var"]
x = ["main_explanatory_var"]

controls_must = [
  "size",
  "lev",
  ["roa", "roe"],
]

controls_test = [
  "cash",
  "growth",
  ["audit_fee", "ln_audit_fee"],
  ["text_len", "word_count", "sentence_count"],
]

# ── Stata 分组扩展图，可留空 ──────────────────────────────────
# 仅 --engine stata 支持。变量必须是连续数值变量。
grouping_variable_by_ind_time = []
grouping_variable_by_time = []
grouping_variable_by_none = []

# ── 输出 ──────────────────────────────────────────────────────
output = "outputs"
export_format = "html"  # png / html / both
dpi = 300
fig_width = 14
n_jobs = 0              # 0 表示自动，最多使用 9 核
order = "p"             # coef：按系数；p：负系数左侧 p 从大到小，正系数右侧 p 从小到大
keep_temp = false

# ── 固定效应变量列名 ──────────────────────────────────────────
Firm_FE = "firm_id"
Ind_FE = "industry"
Time_FE = "year"
Region_FE = "region"

# ── 自动模式：FE + VCE 规格开关 ───────────────────────────────
# true 的每个规格会单独生成一张图。
absorb_firm_time_vce_cluster_firm = true
absorb_firm_time_vce_robust = false

absorb_firm_indtime_vce_cluster_firm = false
absorb_firm_indtime_vce_robust = false

absorb_firm_regiontime_vce_cluster_firm = false
absorb_firm_regiontime_vce_robust = false

absorb_firm_indtime_regiontime_vce_cluster_firm = false
absorb_firm_indtime_regiontime_vce_robust = false

absorb_firm_time_vce_cluster_region = false
absorb_firm_time_vce_cluster_ind = false
absorb_firm_time_vce_cluster_firm_time = false

absorb_ind_time_vce_cluster_firm = false
absorb_ind_time_vce_robust = false

absorb_ind_region_time_vce_cluster_ind = false
absorb_ind_region_time_vce_robust = false

# ── 手动 FE 模式示例 ──────────────────────────────────────────
# 如果使用手动模式，请注释掉上面的 absorb_* 开关，改用 CLI：
#   uv run regression_monkey.py regression_monkey_example.toml --fe industry year --clust firm_id
